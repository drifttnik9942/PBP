<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Parking Timer</title>
<meta name="description" content="Track your parking session countdown and get reminded before it expires." />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0f1210" />

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Parking" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<link rel="icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ============ SETUP SCREEN ============ -->
  <section id="setup-screen" class="screen" aria-labelledby="setup-title">
    <header class="setup-hero">
      <p class="eyebrow">Set up a new session</p>
      <h1 id="setup-title">Parking Timer</h1>
    </header>

    <form id="setup-form" class="setup-form">
      <label class="field">
        <span>Lot name</span>
        <input type="text" id="f-location-name" placeholder="e.g. Imperial Parking" required maxlength="40" />
      </label>

      <label class="field">
        <span>Lot / spot number</span>
        <input type="text" id="f-location-id" placeholder="e.g. 28650" required maxlength="20" />
      </label>

      <label class="field">
        <span>License plate</span>
        <input type="text" id="f-plate" placeholder="e.g. BTN4OF" required maxlength="12" style="text-transform:uppercase" />
      </label>

      <label class="field">
        <span>Vehicle (optional)</span>
        <input type="text" id="f-vehicle" placeholder="e.g. white tacoma" maxlength="30" />
      </label>

      <div class="field">
        <span>Duration</span>
        <div class="chip-row" id="duration-chips">
          <button type="button" class="chip" data-mins="15">15m</button>
          <button type="button" class="chip" data-mins="30">30m</button>
          <button type="button" class="chip is-selected" data-mins="60">1h</button>
          <button type="button" class="chip" data-mins="120">2h</button>
          <button type="button" class="chip" data-mins="240">4h</button>
        </div>
        <input type="number" id="f-duration-custom" min="1" max="1440" placeholder="Custom minutes" />
      </div>

      <button type="submit" class="btn-primary">Start session</button>
    </form>
  </section>

  <!-- ============ SESSION SCREEN ============ -->
  <section id="session-screen" class="screen" aria-labelledby="session-title">
    <header class="session-hero">
      <button id="btn-close" class="btn-close" aria-label="End session and close">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
      </button>
      <h1 id="session-title"></h1>
    </header>

    <div class="card">
      <h2 class="card-title">Parking session</h2>

      <div class="countdown" id="countdown-box">
        <p class="countdown-label">Time remaining</p>
        <div class="countdown-grid">
          <div class="countdown-stat">
            <span id="c-hours">0</span>
            <small>hours</small>
          </div>
          <div class="countdown-stat">
            <span id="c-minutes">00</span>
            <small>minutes</small>
          </div>
          <div class="countdown-stat">
            <span id="c-seconds">00</span>
            <small>seconds</small>
          </div>
        </div>
      </div>

      <div class="ticket-edge" aria-hidden="true"></div>

      <ul class="detail-list">
        <li class="detail-row">
          <span class="icon-badge">
            <img src="Location.png" alt="" width="40" height="40" />
          </span>
          <span class="detail-text">
            <strong id="d-location-id"></strong>
            <small id="d-location-name"></small>
          </span>
        </li>
        <li class="detail-row">
          <span class="icon-badge">
            <img src="Car.png" alt="" width="40" height="40" />
          </span>
          <span class="detail-text">
            <strong id="d-plate"></strong>
            <small id="d-vehicle"></small>
          </span>
        </li>
        <li class="detail-row">
          <span class="icon-badge">
            <img src="Time.png" alt="" width="40" height="40" />
          </span>
          <span class="detail-text">
            <strong id="d-expires"></strong>
            <small id="d-duration"></small>
          </span>
        </li>
      </ul>

      <div class="reminder-card">
        <div class="reminder-text">
          <strong>Expiry reminders</strong>
          <small>Get a notification before your session expires. Requires notification permission.</small>
        </div>
        <label class="switch">
          <input type="checkbox" id="reminder-toggle" />
          <span class="switch-track"><span class="switch-thumb"></span></span>
        </label>
      </div>

      <p class="fineprint" id="permission-note"></p>

      <div id="extend-panel" class="extend-panel" hidden>
        <p class="extend-label">Add time</p>
        <div class="chip-row">
          <button type="button" class="chip" data-add="15">+15m</button>
          <button type="button" class="chip" data-add="30">+30m</button>
          <button type="button" class="chip" data-add="60">+1h</button>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <button id="btn-extend" class="btn-primary">Extend</button>
    </div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
